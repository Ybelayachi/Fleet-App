spring:
  datasource:
    url: jdbc:h2:mem:fleettest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=MONTH,YEAR
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: ""
  flyway:
    enabled: false

app:
  jwt:
    secret: TestSecretKeyForIntegrationTestingPurposesOnlyAtLeast32Chars
    expiration-ms: 86400000
