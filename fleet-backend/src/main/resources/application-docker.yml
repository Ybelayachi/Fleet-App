spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:db2://host.docker.internal:50000/NSI:currentSchema=FLEETDB;}
    username: ${SPRING_DATASOURCE_USERNAME:db2admin}
    password: ${SPRING_DATASOURCE_PASSWORD:DBZ87ken/1987@}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.ibm.db2.jcc.DB2Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.DB2Dialect}
        default_schema: FLEETDB
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: FLEETDB
    baseline-on-migrate: true
    baseline-version: 1

app:
  jwt:
    secret: ${APP_JWT_SECRET:ChangeThisSecretKeyForProdChangeThisSecretKey}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

server:
  port: ${SERVER_PORT:8080}
