spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://fleet-db:5432/fleetdb}
    username: ${SPRING_DATASOURCE_USERNAME:fleetuser}
    password: ${SPRING_DATASOURCE_PASSWORD:fleetpassword}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
        default_schema: fleetdb
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: fleetdb
    baseline-on-migrate: true
    baseline-version: 1

app:
  jwt:
    secret: ${APP_JWT_SECRET:ChangeThisSecretKeyForProdChangeThisSecretKey}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

server:
  port: ${SERVER_PORT:8080}
