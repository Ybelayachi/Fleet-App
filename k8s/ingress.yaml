apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleet-ingress
  namespace: fleet
spec:
  ingressClassName: nginx
  rules:
    - host: fleet.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fleet-frontend
                port:
                  number: 4200
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fleet-backend
                port:
                  number: 8080
