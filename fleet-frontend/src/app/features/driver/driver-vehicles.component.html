<section class="panel">
  <h2>Mes véhicules</h2>
  <p class="panel__subtitle">Affectations actives pour votre compte.</p>

  

  <div *ngIf="loading" style="text-align: center; padding: 20px;">
    Chargement des véhicules...
  </div>

  <div *ngIf="!loading && vehicles.length === 0" class="panel__empty">
    Aucun véhicule affecté pour le moment.
  </div>

  <p-table
    *ngIf="!loading && vehicles.length > 0"
    [value]="vehicles"
    styleClass="data-table"
    [tableStyle]="{ 'width': '100%' }"
    sortMode="single"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="vin">
          VIN
          <p-sortIcon field="vin"></p-sortIcon>
        </th>
        <th pSortableColumn="brand">
          Marque
          <p-sortIcon field="brand"></p-sortIcon>
        </th>
        <th pSortableColumn="model">
          Modèle
          <p-sortIcon field="model"></p-sortIcon>
        </th>
        <th pSortableColumn="licensePlate">
          Plaque
          <p-sortIcon field="licensePlate"></p-sortIcon>
        </th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-vehicle>
      <tr>
        <td>{{ vehicle.vin }}</td>
        <td>{{ vehicle.brand || '-' }}</td>
        <td>{{ vehicle.model || '-' }}</td>
        <td>{{ vehicle.licensePlate || '-' }}</td>
        <td>
          <button
            pButton
            type="button"
            label="Déclarer le kilométrage"
            [routerLink]="['/driver/mileage']"
            [queryParams]="{ vehicleId: vehicle.id }"
          ></button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <div class="panel__empty" *ngIf="!loading && !vehicles.length">Aucun véhicule affecté pour le moment.</div>
</section>
