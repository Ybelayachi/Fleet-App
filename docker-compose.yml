services:

  # ─── 1. Base de données PostgreSQL ───────────────────────────────────────
  fleet-db:
    profiles: ["prod"]
    image: postgres:16
    container_name: fleet-db
    environment:
      POSTGRES_DB: fleetdb
      POSTGRES_USER: ${POSTGRES_USER:-fleetuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetpassword}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetuser -d fleetdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── 2. Backend Spring Boot ───────────────────────────────────────────────
  fleet-backend:
    profiles: ["prod"]
    build:
      context: ./fleet-backend
      dockerfile: Dockerfile
    container_name: fleet-backend
    depends_on:
      fleet-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://fleet-db:5432/fleetdb}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-fleetuser}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-fleetpassword}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-ChangeThisSecretKeyForProdChangeThisSecretKey}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
    ports:
      - '8080:8080'
    restart: unless-stopped

  # ─── 3. pgAdmin (interface web pour visualiser la DB) ────────────────────
  pgadmin:
    profiles: ["prod"]
    image: dpage/pgadmin4
    container_name: fleet-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fleet.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - fleet-db
    restart: unless-stopped

  # ─── 4. Frontend Angular ──────────────────────────────────────────────────
  fleet-frontend:
    profiles: ["prod"]
    build:
      context: ./fleet-frontend
      dockerfile: Dockerfile
    container_name: fleet-frontend
    environment:
      NODE_ENV: production
      PORT: 4200
      BACKEND_URL: http://fleet-backend:8080
    depends_on:
      - fleet-backend
    ports:
      - '4200:4200'
    restart: unless-stopped

  # ─── 5. Backend E2E isolé (H2 in-memory, sans PostgreSQL) ──────────────────
  fleet-backend-e2e:
    profiles: ["e2e"]
    build:
      context: ./fleet-backend
      dockerfile: Dockerfile
    container_name: fleet-backend-e2e
    environment:
      SPRING_PROFILES_ACTIVE: e2e
      SERVER_PORT: 8080
      APP_JWT_SECRET: ${APP_JWT_SECRET:-ChangeThisSecretKeyForProdChangeThisSecretKey}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
    ports:
      - '8081:8080'
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8080/api/auth || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: "no"

  # ─── 6. Frontend E2E isolé (pointe vers fleet-backend-e2e) ──────────────
  fleet-frontend-e2e:
    profiles: ["e2e"]
    build:
      context: ./fleet-frontend
      dockerfile: Dockerfile
    container_name: fleet-frontend-e2e
    environment:
      NODE_ENV: production
      PORT: 4200
      BACKEND_URL: http://fleet-backend-e2e:8080
    ports:
      - '4201:4200'
    depends_on:
      fleet-backend-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: "no"

  # ─── 7. Tests Selenium E2E (Chrome headless, H2 in-memory) ──────────────
  selenium-e2e:
    profiles: ["e2e"]
    build:
      context: ./selenium-e2e
      dockerfile: Dockerfile
    container_name: selenium-e2e
    shm_size: '512m'
    environment:
      BASE_URL: http://fleet-frontend-e2e:4200
      E2E_API_ROOT_URL: http://fleet-backend-e2e:8080
    depends_on:
      fleet-frontend-e2e:
        condition: service_healthy
    restart: "no"


volumes:
  db_data:
